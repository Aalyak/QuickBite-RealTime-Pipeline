<!DOCTYPE html>
<html>
<head>
    <title>QuickBite - Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; }
        .header { background: #16213e; padding: 20px; text-align: center; border-bottom: 2px solid #ff6b35; }
        .container { max-width: 1200px; margin: 30px auto; padding: 20px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #16213e; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #ff6b35; }
        .stat-card h2 { font-size: 36px; color: #ff6b35; }
        .stat-card p { color: #aaa; margin-top: 5px; }
        .orders-table { background: #16213e; border-radius: 10px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #ff6b35; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #2a2a4a; }
        tr:hover { background: #2a2a4a; }
        .status-placed { color: #ffd700; }
        .status-preparing { color: #ff6b35; }
        .status-delivered { color: #4caf50; }
        .live { color: #4caf50; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🍔 QuickBite Admin Dashboard</h1>
        <span class="live">● LIVE</span>
    </div>
    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <h2 id="total-orders">0</h2>
                <p>Total Orders</p>
            </div>
            <div class="stat-card">
                <h2 id="total-revenue">₹0</h2>
                <p>Total Revenue</p>
            </div>
            <div class="stat-card">
                <h2 id="popular-item">-</h2>
                <p>Most Popular Item</p>
            </div>
        </div>
        <div class="orders-table">
            <h2 style="margin-bottom:15px">Live Orders</h2>
            <table>
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Item</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="orders-body">
                </tbody>
            </table>
        </div>
    </div>
    <script>
        async function fetchStats() {
            const res = await fetch('/api/stats');
            const data = await res.json();
            document.getElementById('total-orders').textContent = data.total_orders;
            document.getElementById('total-revenue').textContent = '₹' + data.total_revenue;
            document.getElementById('popular-item').textContent = data.popular_item;
        }

        async function fetchOrders() {
            const res = await fetch('/api/orders');
            const orders = await res.json();
            const tbody = document.getElementById('orders-body');
            tbody.innerHTML = '';
            orders.forEach(order => {
                const row = `<tr>
                    <td>${order.customer_name}</td>
                    <td>${order.item}</td>
                    <td>${order.quantity}</td>
                    <td>₹${order.price}</td>
                    <td class="status-${order.status}">${order.status}</td>
                    <td>${order.timestamp}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        function refresh() {
            fetchStats();
            fetchOrders();
        }

        refresh();
        setInterval(refresh, 3000);
    </script>
</body>
</html>
