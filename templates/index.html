<!DOCTYPE html>
<html>
<head>
    <title>QuickBite - Order Food</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .header { background: #ff6b35; color: white; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 30px auto; padding: 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 20px 0; }
        .menu-item { background: white; border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .menu-item:hover { transform: scale(1.05); }
        .menu-item h3 { margin: 10px 0; }
        .menu-item p { color: #ff6b35; font-weight: bold; }
        .emoji { font-size: 40px; }
        .order-form { background: white; padding: 20px; border-radius: 10px; margin-top: 20px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #ff6b35; color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background: #e55a2b; }
        .success { background: #4caf50; color: white; padding: 15px; border-radius: 5px; margin-top: 10px; display: none; text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🍔 QuickBite</h1>
        <p>Order your favourite food!</p>
    </div>
    <div class="container">
        <h2>Our Menu</h2>
        <div class="menu-grid">
            <div class="menu-item" onclick="selectItem('Pizza', 299)">
                <div class="emoji">🍕</div>
                <h3>Pizza</h3>
                <p>₹299</p>
            </div>
            <div class="menu-item" onclick="selectItem('Burger', 149)">
                <div class="emoji">🍔</div>
                <h3>Burger</h3>
                <p>₹149</p>
            </div>
            <div class="menu-item" onclick="selectItem('Biryani', 199)">
                <div class="emoji">🍛</div>
                <h3>Biryani</h3>
                <p>₹199</p>
            </div>
            <div class="menu-item" onclick="selectItem('Pasta', 179)">
                <div class="emoji">🍝</div>
                <h3>Pasta</h3>
                <p>₹179</p>
            </div>
            <div class="menu-item" onclick="selectItem('Sandwich', 99)">
                <div class="emoji">🥪</div>
                <h3>Sandwich</h3>
                <p>₹99</p>
            </div>
            <div class="menu-item" onclick="selectItem('Noodles', 129)">
                <div class="emoji">🍜</div>
                <h3>Noodles</h3>
                <p>₹129</p>
            </div>
        </div>
        <div class="order-form">
            <h2>Place Your Order</h2>
            <input type="text" id="name" placeholder="Your Name" />
            <input type="text" id="item" placeholder="Selected Item" readonly />
            <input type="number" id="price" placeholder="Price" readonly />
            <input type="number" id="quantity" placeholder="Quantity" min="1" max="10" value="1" />
            <button onclick="placeOrder()">Place Order 🚀</button>
            <div class="success" id="success">✅ Order placed successfully!</div>
        </div>
    </div>
    <script>
        function selectItem(item, price) {
            document.getElementById('item').value = item;
            document.getElementById('price').value = price;
        }

        async function placeOrder() {
            const name = document.getElementById('name').value;
            const item = document.getElementById('item').value;
            const price = document.getElementById('price').value;
            const quantity = document.getElementById('quantity').value;

            if (!name || !item) {
                alert('Please enter your name and select an item!');
                return;
            }

            const response = await fetch('/api/place_order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, item, price, quantity })
            });

            if (response.ok) {
                document.getElementById('success').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('success').style.display = 'none';
                }, 3000);
            }
        }
    </script>
</body>
</html>
