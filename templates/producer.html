<!DOCTYPE html>
<html>
<head>
    <title>QuickBite - Restaurant Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f4f8; }
        .header { background: #2d6a4f; color: white; padding: 20px; text-align: center; }
        .container { max-width: 1200px; margin: 30px auto; padding: 20px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; border-left: 4px solid #2d6a4f; }
        .stat-card h2 { font-size: 36px; color: #2d6a4f; }
        .stat-card p { color: #666; margin-top: 5px; }
        .orders-table { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #2d6a4f; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }
        .btn { padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .btn-prepare { background: #ff6b35; color: white; }
        .btn-deliver { background: #2d6a4f; color: white; }
        .status-placed { color: #ffd700; font-weight: bold; }
        .status-preparing { color: #ff6b35; font-weight: bold; }
        .status-delivered { color: #2d6a4f; font-weight: bold; }
        .live { color: #2d6a4f; font-size: 12px; }
        h2 { margin-bottom: 15px; color: #2d6a4f; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🍽️ QuickBite Restaurant Panel</h1>
        <span class="live">● LIVE</span>
    </div>
    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <h2 id="pending">0</h2>
                <p>Pending Orders</p>
            </div>
            <div class="stat-card">
                <h2 id="preparing">0</h2>
                <p>Preparing</p>
            </div>
            <div class="stat-card">
                <h2 id="delivered">0</h2>
                <p>Delivered Today</p>
            </div>
        </div>
        <div class="orders-table">
            <h2>Incoming Orders</h2>
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Item</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="orders-body">
                </tbody>
            </table>
        </div>
    </div>
    <script>
        async function fetchOrders() {
            const res = await fetch('/api/orders');
            const orders = await res.json();
            const tbody = document.getElementById('orders-body');
            tbody.innerHTML = '';

            let pending = 0, preparing = 0, delivered = 0;

            orders.forEach(order => {
                if (order.status === 'placed') pending++;
                if (order.status === 'preparing') preparing++;
                if (order.status === 'delivered') delivered++;

                const actions = order.status === 'placed'
                    ? `<button class="btn btn-prepare" onclick="updateStatus('${order.order_id}', 'preparing')">Start Preparing</button>`
                    : order.status === 'preparing'
                    ? `<button class="btn btn-deliver" onclick="updateStatus('${order.order_id}', 'delivered')">Mark Delivered</button>`
                    : '✅ Done';

                const row = `<tr>
                    <td>${order.order_id.substring(0, 8)}...</td>
                    <td>${order.customer_name}</td>
                    <td>${order.item}</td>
                    <td>${order.quantity}</td>
                    <td>₹${order.price}</td>
                    <td class="status-${order.status}">${order.status}</td>
                    <td>${actions}</td>
                </tr>`;
                tbody.innerHTML += row;
            });

            document.getElementById('pending').textContent = pending;
            document.getElementById('preparing').textContent = preparing;
            document.getElementById('delivered').textContent = delivered;
        }

        async function updateStatus(orderId, newStatus) {
            await fetch('/api/update_status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ order_id: orderId, status: newStatus })
            });
            fetchOrders();
        }

        fetchOrders();
        setInterval(fetchOrders, 3000);
    </script>
</body>
</html>
